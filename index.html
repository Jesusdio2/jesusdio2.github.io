  <!-- Firebase -->
  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";

    import {
      getAnalytics
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-analytics.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

    const firebaseConfig = {

      apiKey:
        "TU_API_KEY",

      authDomain:
        "tu-app.firebaseapp.com",

      projectId:
        "tu-app",

      storageBucket:
        "tu-app.appspot.com",

      messagingSenderId:
        "XXXXXXXX",

      appId:
        "XXXXXXXX",

      measurementId:
        "XXXXXXXX"
    };

    const app =
      initializeApp(firebaseConfig);

    const analytics =
      getAnalytics(app);

    const auth =
      getAuth(app);

    const provider =
      new GoogleAuthProvider();

    const loginBtn =
      document.getElementById("loginBtn");

    const logoutBtn =
      document.getElementById("logoutBtn");

    const userInfo =
      document.getElementById("userInfo");

    const userIcon =
      document.getElementById("userIcon");

    loginBtn.addEventListener(
      "click",
      async () => {

        try {

          const result =
            await signInWithPopup(
              auth,
              provider
            );

          const user =
            result.user;

          const firstName =
            user.displayName
              ? user.displayName.split(" ")[0]
              : "";

          userInfo.textContent =
            `Hola, ${firstName}`;

          userIcon.innerHTML =
            `<img src="${
              user.photoURL ||
              'res/profile.png'
            }">`;

        } catch (error) {

          console.error(error);

        }

      }
    );

    logoutBtn.addEventListener(
      "click",
      async () => {

        await signOut(auth);

      }
    );

    onAuthStateChanged(
      auth,
      (user) => {

        if (user) {

          const firstName =
            user.displayName
              ? user.displayName.split(" ")[0]
              : "";

          userInfo.textContent =
            `Conectado: ${firstName}`;

          userIcon.innerHTML =
            `<img src="${
              user.photoURL ||
              'res/profile.png'
            }">`;

        } else {

          userInfo.textContent =
            "No hay sesión activa.";

          userIcon.innerHTML =
            `
            <span class="material-icons">
              account_circle
            </span>
            `;
        }

      }
    );

  </script>
