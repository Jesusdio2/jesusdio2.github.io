<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>FAES</title>

  <link
    rel="icon"
    href="res/icon.png" />

  <!-- Material Web Components -->

  <script
    type="module"
    src="https://esm.run/@material/web/all">
  </script>

  <!-- Google Fonts -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <!-- Material Icons -->

  <link
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet">

  <style>

    :root {

      /* Material 3 Dark Theme */

      --md-sys-color-primary: #7dff86;

      --md-sys-color-on-primary: #002204;

      --md-sys-color-secondary: #7dd3fc;

      --md-sys-color-background: #101414;

      --md-sys-color-surface: #1b1f1f;

      --md-sys-color-surface-container: #232828;

      --md-sys-color-outline: #3f4948;

      --md-sys-color-on-surface: #e2e3df;

      --md-sys-color-on-surface-variant: #b0b8b4;
    }

    * {

      box-sizing: border-box;
    }

    html {

      scroll-behavior: smooth;

      -webkit-text-size-adjust: 100%;

      text-size-adjust: 100%;
    }

    body {

      margin: 0;

      min-height: 100vh;

      min-height: 100dvh;

      background:
        var(--md-sys-color-background);

      color:
        var(--md-sys-color-on-surface);

      font-family:
        "Roboto",
        sans-serif;

      display: flex;

      flex-direction: column;

      overflow-x: hidden;

      overflow-y: auto;
    }

    img {

      max-width: 100%;

      display: block;
    }

    /* =========================
       Top App Bar
    ========================= */

    header {

      min-height: 72px;

      width: 100%;

      padding: 0 20px;

      background:
        rgba(27, 31, 31, 0.92);

      backdrop-filter:
        blur(12px);

      -webkit-backdrop-filter:
        blur(12px);

      border-bottom:
        1px solid
        var(--md-sys-color-outline);

      display: flex;

      align-items: center;

      justify-content: space-between;

      gap: 16px;

      position: sticky;

      top: 0;

      z-index: 100;
    }

    .header-left,
    .header-right {

      display: flex;

      align-items: center;

      gap: 12px;

      flex-wrap: wrap;
    }

    .logo {

      font-size: 1.3rem;

      font-weight: 700;

      letter-spacing: 1px;

      color:
        var(--md-sys-color-primary);
    }

    /* =========================
       Main Content
    ========================= */

    main {

      flex: 1;

      width: 100%;

      max-width: 1200px;

      margin: auto;

      padding:
        48px 20px;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      gap: 32px;
    }

    .hero {

      text-align: center;

      display: flex;

      flex-direction: column;

      gap: 12px;
    }

    .hero h1 {

      margin: 0;

      font-size:
        clamp(2rem, 5vw, 3.5rem);

      font-weight: 700;
    }

    .hero p {

      margin: 0;

      color:
        var(--md-sys-color-on-surface-variant);

      font-size: 1.1rem;
    }

    /* =========================
       Material Card
    ========================= */

    .game-card {

      width: min(100%, 500px);

      background:
        var(--md-sys-color-surface);

      border:
        1px solid
        var(--md-sys-color-outline);

      border-radius: 28px;

      padding: 28px;

      display: flex;

      flex-direction: column;

      gap: 18px;

      box-shadow:
        0 4px 18px rgba(0, 0, 0, 0.28);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .game-card:hover {

      transform:
        translateY(-2px);

      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.36);
    }

    .game-card h2 {

      margin: 0;

      font-size: 1.6rem;
    }

    .game-card p {

      margin: 0;

      line-height: 1.6;

      color:
        var(--md-sys-color-on-surface-variant);
    }

    /* =========================
       User Info
    ========================= */

    #userInfo {

      padding:
        12px 18px;

      border-radius: 999px;

      background:
        var(--md-sys-color-surface-container);

      color:
        var(--md-sys-color-on-surface);

      font-size: 0.95rem;
    }

    #userIcon {

      overflow: hidden;

      border-radius: 50%;
    }

    #userIcon img {

      width: 100%;

      height: 100%;

      object-fit: cover;
    }

    /* =========================
       Material Buttons
    ========================= */

    md-filled-button,
    md-outlined-button,
    md-filled-tonal-button {

      --md-filled-button-container-shape: 16px;

      --md-outlined-button-container-shape: 16px;

      --md-filled-tonal-button-container-shape: 16px;
    }

    /* =========================
       Bottom App Bar
    ========================= */

    footer {

      min-height: 64px;

      padding:
        16px
        20px
        calc(16px + env(safe-area-inset-bottom));

      border-top:
        1px solid
        var(--md-sys-color-outline);

      background:
        rgba(27, 31, 31, 0.96);

      backdrop-filter:
        blur(12px);

      -webkit-backdrop-filter:
        blur(12px);

      display: flex;

      align-items: center;

      justify-content: center;

      text-align: center;

      color:
        var(--md-sys-color-on-surface-variant);

      font-size: 0.95rem;
    }

    /* =========================
       Responsive Design
    ========================= */

    @media (max-width: 1024px) {

      main {

        padding:
          40px 18px;
      }

      .game-card {

        width: min(100%, 700px);
      }
    }

    @media (max-width: 700px) {

      header {

        height: auto;

        padding:
          max(16px, env(safe-area-inset-top))
          16px
          16px
          16px;

        flex-direction: column;

        align-items: stretch;
      }

      .header-left,
      .header-right {

        width: 100%;

        justify-content: center;
      }

      .header-left {

        flex-direction: column;
      }

      .header-right {

        flex-wrap: wrap;
      }

      md-filled-button,
      md-outlined-button,
      md-filled-tonal-button {

        width: 100%;
      }

      main {

        padding:
          32px 16px;
      }

      .hero h1 {

        font-size:
          clamp(1.8rem, 8vw, 2.5rem);
      }

      .hero p {

        font-size:
          1rem;
      }

      .game-card {

        border-radius: 20px;

        padding: 22px;
      }

      .game-card h2 {

        font-size: 1.4rem;
      }
    }

    @media (max-width: 400px) {

      .logo {

        font-size: 1.1rem;
      }

      .hero h1 {

        font-size: 1.6rem;
      }

      .game-card {

        padding: 18px;

        border-radius: 18px;
      }

      #userInfo {

        width: 100%;

        text-align: center;
      }
    }

    @media (max-height: 500px)
    and (orientation: landscape) {

      header {

        position: relative;
      }

      main {

        padding-top: 24px;
      }

      .hero {

        gap: 6px;
      }

      .game-card {

        width: min(100%, 900px);
      }
    }

    @media (min-width: 1600px) {

      main {

        max-width: 1400px;
      }

      .hero h1 {

        font-size: 4.5rem;
      }

      .game-card {

        width: min(100%, 650px);

        padding: 36px;
      }
    }

    @media (min-width: 2200px) {

      body {

        font-size: 1.25rem;
      }

      .hero h1 {

        font-size: 6rem;
      }

      .game-card {

        width: min(100%, 800px);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      * {

        animation: none !important;

        transition: none !important;

        scroll-behavior: auto !important;
      }
    }

  </style>

</head>

<body>

  <!-- Top App Bar -->

  <header>

    <div class="header-left">

      <div class="logo">
        FAES
      </div>

      <md-filled-tonal-button
        id="languageBtn">

        🌐 Idioma

      </md-filled-tonal-button>

      <md-filled-tonal-button
        href="https://www.youtube.com/@FAESWSPVZ191"
        target="_blank">

        YouTube

      </md-filled-tonal-button>

      <md-filled-tonal-button
        href="https://x.com/FAESWSPVZ191"
        target="_blank">

        X

      </md-filled-tonal-button>

    </div>

    <div class="header-right">

      <md-filled-button id="loginBtn">

        Login

      </md-filled-button>

      <md-outlined-button
        id="logoutBtn"
        style="display: none;">

        Logout

      </md-outlined-button>

      <md-icon-button id="userIcon">

        <span class="material-icons">
          account_circle
        </span>

      </md-icon-button>

    </div>

  </header>

  <!-- Main -->

  <main>

    <section class="hero">

      <h1 data-i18n="welcome">
        Bienvenido a FAES
      </h1>

      <p
        id="userInfo"
        data-i18n="noSession">

        No hay sesión activa.

      </p>

    </section>

    <!-- Project Card -->

    <!-- Project Card -->

<section class="game-card">

  <img
    src="res/score_0.svg"
    alt="Algo Temporal Para Bernardo">

  <h2 data-i18n="projectTitle">
    Prueba3D
  </h2>

  <p data-i18n="projectDescription">
    Proyecto experimental 3D publicado en GitHub.
  </p>

  <md-filled-button
    href="https://github.com/FAES2/Prueba3D"
    target="_blank"
    data-i18n="viewProject">

    Ver Proyecto

  </md-filled-button>

</section>
  </main>

  <!-- Bottom App Bar -->

  <footer
    data-i18n="footer">

    © 2026 Francisco — Proyecto bajo Licencia MIT.

  </footer>

  <!-- Firebase -->

  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAnalytics
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    // =========================
    // Firebase Config
    // =========================

    const firebaseConfig = {

      apiKey:
        "AIzaSyAOmXcJaujzmMwmHDIbCOUzTh-dlFQKdIA",

      authDomain:
        "faes-page.firebaseapp.com",

      projectId:
        "faes-page",

      storageBucket:
        "faes-page.firebasestorage.app",

      messagingSenderId:
        "880596540892",

      appId:
        "1:880596540892:web:f606b56a7d341a0e514319",

      measurementId:
        "G-PVR2V1FQ33"
    };

    // =========================
    // Firebase Init
    // =========================

    const app =
      initializeApp(firebaseConfig);

    const analytics =
      getAnalytics(app);

    const auth =
      getAuth(app);

    const provider =
      new GoogleAuthProvider();

    // =========================
    // UI Elements
    // =========================

    const loginBtn =
      document.getElementById("loginBtn");

    const logoutBtn =
      document.getElementById("logoutBtn");

    const userInfo =
      document.getElementById("userInfo");

    const userIcon =
      document.getElementById("userIcon");

    const languageBtn =
      document.getElementById(
        "languageBtn"
      );

    // =========================
    // Languages
    // =========================

    const translations = {

      es: {

        welcome:
          "Bienvenido a FAES",

        noSession:
          "No hay sesión activa.",

        connected:
          "Conectado:",

        projectTitle:
          "Prueba3D",

        projectDescription:
          "Proyecto experimental 3D publicado en GitHub.",

        viewProject:
          "Ver Proyecto",

        footer:
          "© 2026 Francisco — Proyecto bajo Licencia MIT.",

        login:
          "Login",

        logout:
          "Logout",

        language:
          "🌐 Idioma"
      },

      en: {

        welcome:
          "Welcome to FAES",

        noSession:
          "No active session.",

        connected:
          "Connected:",

        projectTitle:
          "Prueba3D",

        projectDescription:
          "Experimental 3D project published on GitHub.",

        viewProject:
          "View Project",

        footer:
          "© 2026 Francisco — Project under MIT License.",

        login:
          "Login",

        logout:
          "Logout",

        language:
          "🌐 Language"
      },

      ja: {

        welcome:
          "FAESへようこそ",

        noSession:
          "ログインしていません。",

        connected:
          "接続済み:",

        projectTitle:
          "Prueba3D",

        projectDescription:
          "GitHubで公開されている実験的な3Dプロジェクト。",

        viewProject:
          "プロジェクトを見る",

        footer:
          "© 2026 Francisco — MITライセンス。",

        login:
          "ログイン",

        logout:
          "ログアウト",

        language:
          "🌐 言語"
      },

      pt: {

        welcome:
          "Bem-vindo ao FAES",

        noSession:
          "Nenhuma sessão ativa.",

        connected:
          "Conectado:",

        projectTitle:
          "Prueba3D",

        projectDescription:
          "Projeto 3D experimental publicado no GitHub.",

        viewProject:
          "Ver Projeto",

        footer:
          "© 2026 Francisco — Projeto sob licença MIT.",

        login:
          "Entrar",

        logout:
          "Sair",

        language:
          "🌐 Idioma"
      },

      fr: {

        welcome:
          "Bienvenue sur FAES",

        noSession:
          "Aucune session active.",

        connected:
          "Connecté :",

        projectTitle:
          "Prueba3D",

        projectDescription:
          "Projet 3D expérimental publié sur GitHub.",

        viewProject:
          "Voir le projet",

        footer:
          "© 2026 Francisco — Projet sous licence MIT.",

        login:
          "Connexion",

        logout:
          "Déconnexion",

        language:
          "🌐 Langue"
      }
    };

    let currentLanguage =
      localStorage.getItem(
        "language"
      ) ||
      navigator.language.slice(0, 2);

    if (!translations[currentLanguage]) {

      currentLanguage = "en";
    }

    function applyLanguage(lang) {

      currentLanguage = lang;

      localStorage.setItem(
        "language",
        lang
      );

      document.documentElement.lang =
        lang;

      const elements =
        document.querySelectorAll(
          "[data-i18n]"
        );

      elements.forEach((element) => {

        const key =
          element.dataset.i18n;

        if (
          translations[lang][key]
        ) {

          element.textContent =
            translations[lang][key];
        }

      });

      loginBtn.textContent =
        translations[lang].login;

      logoutBtn.textContent =
        translations[lang].logout;

      languageBtn.textContent =
        translations[lang].language;
    }

    applyLanguage(
      currentLanguage
    );

    languageBtn.addEventListener(
      "click",
      () => {

        const languages =
          Object.keys(
            translations
          );

        let index =
          languages.indexOf(
            currentLanguage
          );

        index =
          (index + 1) %
          languages.length;

        applyLanguage(
          languages[index]
        );
      }
    );

    // =========================
    // Login
    // =========================

    loginBtn.addEventListener(
      "click",
      async () => {

        try {

          await signInWithPopup(
            auth,
            provider
          );

        } catch (error) {

          console.error(
            "Error al iniciar sesión:",
            error
          );

        }

      }
    );

    // =========================
    // Logout
    // =========================

    logoutBtn.addEventListener(
      "click",
      async () => {

        try {

          await signOut(auth);

        } catch (error) {

          console.error(
            "Error al cerrar sesión:",
            error
          );

        }

      }
    );

    // =========================
    // Auth State
    // =========================

    onAuthStateChanged(
      auth,
      (user) => {

        if (user) {

          const firstName =
            user.displayName
              ? user.displayName.split(" ")[0]
              : "Usuario";

          userInfo.textContent =
            `${translations[currentLanguage].connected} ${firstName}`;

          userIcon.innerHTML =
            `
            <img
              src="${
                user.photoURL ||
                'res/profile.png'
              }"
              alt="Avatar">
            `;

          loginBtn.style.display =
            "none";

          logoutBtn.style.display =
            "inline-flex";

        } else {

          userInfo.textContent =
            translations[currentLanguage]
              .noSession;

          userIcon.innerHTML =
            `
            <span class="material-icons">
              account_circle
            </span>
            `;

          loginBtn.style.display =
            "inline-flex";

          logoutBtn.style.display =
            "none";
        }

      }
    );

  </script>

</body>

</html>
