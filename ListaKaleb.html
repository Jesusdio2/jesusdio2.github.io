<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependencia Sketchware Pro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
        }
        h1 {
            font-size: 20px;
            color: #ff9800;
        }
        p {
            font-size: 14px;
            color: #b0bec5;
        }
        /* Bloque contenedor optimizado para texto plano puro */
        pre {
            background-color: #1e1e1e;
            color: #4caf50;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #333333;
            overflow-x: auto;
            font-family: "Courier New", Courier, monospace;
            font-size: 15px;
            font-weight: bold;
            white-space: pre-wrap; /* Ajusta el texto al ancho de la pantalla móvil */
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h1>CardView para Sketchware Pro</h1>
    <p>Introduce este texto directamente en el gestor de librerías locales de tu proyecto:</p>

    <!-- Texto plano limpio, listo para visualizar en Sketchware Pro -->
    <pre>androidx.cardview:cardview:1.0.0</pre>

</body>
</html>
